name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repozitoriyni olish
        uses: actions/checkout@v4

      - name: Node.js sozlash
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JDK sozlash
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Android SDK sozlash
        uses: android-actions/setup-android@v3

      - name: Bog'liqliklarni o'rnatish
        run: npm install

      - name: Veb-ilovani build qilish
        run: npm run build

      - name: Capacitor CLI va Android platformasini o'rnatish
        run: |
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli

      - name: Capacitor loyihasini yaratish (agar mavjud bo'lmasa)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap copy android
          npx cap update android

      - name: APK qurish (debug)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK-ni saqlash (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: tolovlar-daftari-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
